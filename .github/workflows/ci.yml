name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-publish:
    runs-on: windows-latest
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      DOTNET_NOLOGO: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore SupportCaseManager.slnx

      - name: Build
        run: dotnet build SupportCaseManager.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/SupportCaseManager.Tests/SupportCaseManager.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Publish
        run: dotnet publish src/SupportCaseManager.App/SupportCaseManager.App.csproj -c Release -p:PublishProfile=WinX64SingleFile -p:PublishDir=artifacts\\SupportCaseManager\\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SupportCaseManager-win-x64
          path: artifacts/SupportCaseManager/