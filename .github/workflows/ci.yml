name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore SupportCaseManager.slnx

      - name: Build
        run: dotnet build SupportCaseManager.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SupportCaseManager.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"
